<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Trust | Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #0b1220, #020617);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: move 12s linear infinite;
        }

        @keyframes move {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Glass card */
        .card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 16px;
            padding: 42px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 40px rgba(59,130,246,0.25);
            animation: fadeUp 0.6s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
        }

        .logo svg {
            width: 40px;
            height: 38px;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 10px #3b82f6); }
            to   { filter: drop-shadow(0 0 25px #60a5fa); }
        }

        h2 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        /* Inputs */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            background: rgba(2,6,23,0.8);
            border: 1px solid rgba(59,130,246,0.2);
            border-radius: 10px;
            color: #e2e8f0;
            font-size: 0.95rem;
            transition: 0.25s;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 12px rgba(59,130,246,0.5);
        }

        /* Validation */
        input.valid   { border-color: #22c55e; }
        input.invalid { border-color: #ef4444; }

        /* Button */
        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 0 20px rgba(59,130,246,0.6);
        }

        button:active {
            transform: scale(0.97);
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        button.loading .btn-text { display: none; }
        button.loading .spinner  { display: block; }

        /* Result */
        #result {
            margin-top: 14px;
            text-align: center;
            font-size: 0.85rem;
            color: #ef4444;
        }

        #result.success {
            color: #22c55e;
        }

        /* Footer */
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .footer-link a {
            color: #3b82f6;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="card">
    <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
    </div>
    <h2>Zero Trust</h2>
    <p class="subtitle">Sign in to your secure workspace</p>

    <form id="loginForm" novalidate>
        <div class="form-group">
            <label for="username">Username</label>
            <div class="input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
                <span class="validation-icon"></span>
            </div>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
                <span class="validation-icon"></span>
            </div>
        </div>
        <button type="submit" id="submitBtn">
            <span class="btn-text">Sign In</span>
            <div class="spinner"></div>
        </button>
    </form>

    <p id="result"></p>

    <div class="footer-link">
        Don't have an account? <a href="/signup-page">Create one</a>
    </div>
</div>

<script>
// Live validation
document.getElementById("username").addEventListener("input", function () {
    this.className = this.value.trim().length >= 3 ? "valid" : "invalid";
});

document.getElementById("password").addEventListener("input", function () {
    this.className = this.value.length >= 1 ? "valid" : "invalid";
});

document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const result  = document.getElementById("result");
    const btn     = document.getElementById("submitBtn");
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    result.className = "";
    result.innerText = "";
    btn.classList.add("loading");

    try {
        const res  = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok && data.access_token) {
            localStorage.setItem("token", data.access_token);
            result.className = "success show";
            result.innerText = "Login successful! Redirecting...";
            setTimeout(() => { window.location.href = "/dashboard-page"; }, 800);
        } else {
            result.className = "show";
            result.innerText = data.msg || "Invalid credentials";
            // Shake the card
            document.querySelector(".card").animate(
                [{ transform: "translateX(-6px)" }, { transform: "translateX(6px)" },
                 { transform: "translateX(-4px)" }, { transform: "translateX(4px)" },
                 { transform: "translateX(0)" }],
                { duration: 300 }
            );
        }
    } catch {
        result.className = "show";
        result.innerText = "Server error. Check backend.";
    } finally {
        btn.classList.remove("loading");
    }
});
</script>
</body>
</html>
